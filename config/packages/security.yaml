security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
            
        login:
            pattern: ^/api/auth/login
            stateless: true
            provider: app_user_provider
            json_login:
                check_path: /api/auth/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        # Rutas públicas que NO necesitan JWT (deben ir antes del firewall 'api')
        public_api:
            pattern: ^/api/(auth/registro|auth/verify|dev|productos|categorias)
            stateless: true
            security: false

        api:
            pattern: ^/api
            stateless: true
            jwt:
                # Permite que si no hay token pase igualmente (lo controla access_control)
                authenticator: lexik_jwt_authentication.security.jwt_authenticator

        main:
            lazy: true
            provider: app_user_provider
            custom_authenticator: App\Security\AppAuthenticator
            logout:
                path: app_logout
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                path: /

    access_control:
        # Rutas que requieren usuario autenticado
        - { path: ^/api/pedidos, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/auth/me, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/auth/perfil, roles: IS_AUTHENTICATED_FULLY }
        # Resto de la API es pública (productos, categorías, registro, login)
        - { path: ^/api, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/profile, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
