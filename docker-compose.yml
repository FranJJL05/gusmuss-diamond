version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gusmuss_web
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      # var/ en un volumen Docker nativo (Linux) para que la caché sea rápida en Windows
      - symfony_var:/var/www/html/var
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: gusmuss_db
    restart: always
    environment:
      MYSQL_DATABASE: gusmuss_db
      MYSQL_USER: gusmuss_user
      MYSQL_PASSWORD: secretpassword
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
  symfony_var:
