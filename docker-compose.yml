version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gusmuss_web
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      # var/ en un volumen Docker nativo (Linux) para que la caché sea rápida en Windows
      - symfony_var:/var/www/html/var
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: gusmuss_db
    restart: always
    environment:
      MYSQL_DATABASE: gusmuss_db
      MYSQL_USER: gusmuss_user
      MYSQL_PASSWORD: secretpassword
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: gusmuss_n8n
    restart: always
    ports:
      - "5688:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Europe/Madrid
    volumes:
      - n8n_data:/home/node/.n8n

  mailer:
    image: mailhog/mailhog
    container_name: gusmuss_mailer
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Interfaz Web

volumes:
  db_data:
  symfony_var:
  n8n_data:
