---
# Deployment: define cómo se despliega el backend Symfony (imagen construida localmente)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: gusmuss-ns
  labels:
    app: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          # Imagen construida localmente en el servidor AWS con: docker build -t gusmuss_web .
          image: gusmuss_web:latest
          # imagePullPolicy Never = K3s usa la imagen local, no intenta descargarla de internet
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          env:
            - name: DATABASE_URL
              value: "mysql://gusmuss_user:secretpassword@db:3306/gusmuss_db?serverVersion=8.0"
            - name: APP_ENV
              value: "prod"
            - name: APP_SECRET
              value: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4"
            - name: MAILER_DSN
              value: "smtp://mailer:1025"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"

---
# Service: expone el backend Symfony al exterior en el puerto 8000
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: gusmuss-ns
spec:
  selector:
    app: web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
  type: NodePort
