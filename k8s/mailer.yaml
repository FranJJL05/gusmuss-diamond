---
# Deployment: define cómo se despliega el servidor de correo Mailhog
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailer
  namespace: gusmuss-ns
  labels:
    app: mailer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailer
  template:
    metadata:
      labels:
        app: mailer
    spec:
      containers:
        - name: mailhog
          image: mailhog/mailhog
          ports:
            - containerPort: 1025 # SMTP
            - containerPort: 8025 # Interfaz Web
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"

---
# Service: expone Mailhog internamente (SMTP) y al exterior (interfaz web)
apiVersion: v1
kind: Service
metadata:
  name: mailer
  namespace: gusmuss-ns
spec:
  selector:
    app: mailer
  ports:
    - name: smtp
      protocol: TCP
      port: 1025
      targetPort: 1025
    - name: webui
      protocol: TCP
      port: 8025
      targetPort: 8025
      nodePort: 30825
  type: NodePort
